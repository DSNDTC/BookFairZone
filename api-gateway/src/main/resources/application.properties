spring.application.name=api-gateway
server.port=8080

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://security-service:8081

eureka.client.serviceUrl.defaultZone=http://eureka-server:8761/eureka/

spring.cloud.gateway.routes[0].id=security-service-auth
spring.cloud.gateway.routes[0].uri=lb://security-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=security-service-oauth
spring.cloud.gateway.routes[1].uri=lb://security-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.routes[2].id=reservation-service
spring.cloud.gateway.routes[2].uri=lb://reservation-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reservations/**

spring.cloud.gateway.routes[3].id=stall-service
spring.cloud.gateway.routes[3].uri=lb://stall-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/stalls/**

spring.cloud.gateway.routes[4].id=user-service
spring.cloud.gateway.routes[4].uri=lb://user-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/users/**