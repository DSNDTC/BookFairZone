spring.application.name=api-gateway
server.port=8080

jwt.secret=${JWT_SECRET:}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${SECURITY_SERVICE_ISSUER_URI:http://security-service:8080}

spring.cloud.gateway.routes[0].id=security-service-auth
spring.cloud.gateway.routes[0].uri=${SECURITY_SERVICE_URI:http://security-service:8080}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=security-service-oauth
spring.cloud.gateway.routes[1].uri=${SECURITY_SERVICE_URI:http://security-service:8080}
spring.cloud.gateway.routes[1].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.routes[2].id=reservation-service
spring.cloud.gateway.routes[2].uri=${RESERVATION_SERVICE_URI:http://reservation-service:8085}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reservations/**

spring.cloud.gateway.routes[3].id=stall-service
spring.cloud.gateway.routes[3].uri=${STALL_SERVICE_URI:http://stall-service:8080}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/stalls/**

spring.cloud.gateway.routes[4].id=user-service
spring.cloud.gateway.routes[4].uri=${USER_SERVICE_URI:http://user-service:8080}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/users/**