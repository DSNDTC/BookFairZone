# Docker profile for api-gateway
server.port=8080

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-here-change-in-production-minimum-256-bits-for-HS256}

# OAuth2 Resource Server - point to security-service container
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://security-service:8082

# Gateway routes - use direct service URLs instead of Eureka
spring.cloud.gateway.routes[0].id=security-service-auth
spring.cloud.gateway.routes[0].uri=http://security-service:8082
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=security-service-oauth
spring.cloud.gateway.routes[1].uri=http://security-service:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/oauth2/**

spring.cloud.gateway.routes[2].id=reservation-service
spring.cloud.gateway.routes[2].uri=http://reservation-service:8085
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reservations/**

spring.cloud.gateway.routes[3].id=stall-service
spring.cloud.gateway.routes[3].uri=http://stall-service:8084
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/stalls/**

spring.cloud.gateway.routes[4].id=user-service
spring.cloud.gateway.routes[4].uri=http://user-service:8086
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/users/**

# Disable Eureka for Docker environment
eureka.client.enabled=false

# Actuator endpoints
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
