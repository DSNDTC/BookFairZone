version: "3.9"
services:

  mysql:
    image: mysql:8.0
    container_name: stall_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: stall_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  stall-service:
    build: .
    container_name: stall_service
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stall_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpass
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
    ports:
      - "8083:8080"

volumes:
  mysql-data:
