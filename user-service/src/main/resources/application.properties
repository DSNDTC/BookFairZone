# Application Configuration
spring.application.name=user-service
server.port=8084

# when running inside the Docker Compose network.
spring.datasource.url=jdbc:postgresql://postgres-db:5432/userdb

spring.datasource.username=myuser
spring.datasource.password=mysecretpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.topic.user-registered=user.registered.events

# Kafka Consumer Configuration
spring.kafka.consumer.group-id=user-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

# CRITICAL: Trust all packages for JSON deserialization
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Logging
logging.level.com.bookfair.user_service=DEBUG
logging.level.org.springframework.kafka=INFO
logging.level.org.apache.kafka=WARN