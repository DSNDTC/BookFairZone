spring.application.name=reservation-service

# --- Local Docker Database Configuration ---
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# --- Kafka Configuration ---
# The docker-compose.yml will OVERRIDE localhost:9092
spring.kafka.producer.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

app.kafka.topic.notification=reservation.confirmed.events
app.kafka.topic.stall-update=stall.status.update

spring.kafka.topic.name = reservation-topic

stall.service.url=${STALL_SERVICE_URL:http://stall-service:8080/api/stalls}