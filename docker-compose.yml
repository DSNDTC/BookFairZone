  kafka-consumer:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-consumer
    depends_on:
      - kafka
    # This command block is now corrected
    command: >
      sh -c "
        echo 'Waiting for Kafka to be ready...'
        cub kafka-ready -b kafka:29092 1 60
        echo 'Kafka is ready!'
        
        # This is now on a single line to avoid shell errors
        kafka-console-consumer --bootstrap-server kafka:29092 --topic reservation.confirmed.events --from-beginning
      "
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    depends_on:
      - kafka
      - zookeeper
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - app-network

  # Define the network for services to communicate
networks:
  app-network:
    driver: bridge

# Define the volume for persistent data
volumes:
  postgres_data:
    driver: local