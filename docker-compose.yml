services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    ports:
      # Exposes Kafka to your host machine on port 9092
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      # Listeners:
      # - PLAINTEXT://kafka:29092 is for internal communication between containers
      # - PLAINTEXT_HOST://localhost:9092 is for communication from your host machine
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - app-network

  db:
    image: postgres:15-alpine # Use an official PostgreSQL image
    container_name: local_postgres_db
    restart: always
    environment:
      # Set environment variables for the database
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecretpassword

    ports:
      # Map port 5432 on your host to 5432 in the container
      # This allows your app (even outside Docker) to connect via localhost:5432
      - "5432:5432"
    volumes:
      # Persist database data locally in a Docker volume
      - postgres_data:/var/lib/postgresql/data
      # Mount SQL init script to create additional databases
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d reservation_security"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  security-service:
    build:
      context: .
      dockerfile: ./security-service/Dockerfile
    container_name: security-service
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mysecretpassword
      SPRING_MAIL_HOST: ${MAIL_HOST}
      SPRING_MAIL_PORT: ${MAIL_PORT}
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost:8080
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@bookfair.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_AUTO_CREATE: ${ADMIN_AUTO_CREATE:-true}
    ports:
      - "8082:8080"
    networks:
      - app-network
    restart: unless-stopped


  mysql:
    image: mysql:8.0
    container_name: stall_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: stall_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  stall-service:
    build: ./stall-service
    container_name: stall_service
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stall_db?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: rootpass
      CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000,http://localhost:8080"
      SERVER_PORT: 8080
    ports:
      - "8075:8080"
    networks:
      - app-network

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/userdb
      SPRING_DATASOURCE_USERNAME: myuser
      SPRING_DATASOURCE_PASSWORD: mysecretpassword
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8084
    ports:
      - "8084:8084"
    networks:
      - app-network
    restart: unless-stopped

  api-gateway:
   build:
     context: .
     dockerfile: ./api-gateway/Dockerfile
   container_name: api-gateway
   restart: always
   ports:
     - "8080:8080"
   depends_on:
     security-service:
       condition: service_started
     reservation-service:
       condition: service_healthy
   environment:
     SERVER_PORT: 8080
     JWT_SECRET: ${JWT_SECRET}
     SECURITY_SERVICE_URI: http://security-service:8080
     SECURITY_SERVICE_ISSUER_URI: http://security-service:8080
     RESERVATION_SERVICE_URI: http://reservation-service:8085
     STALL_SERVICE_URI: http://stall-service:8080
     USER_SERVICE_URI: http://user-service:8084
     CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
   networks:
     - app-network
   healthcheck:
     test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
     interval: 30s
     timeout: 10s
     start_period: 60s
     retries: 3

  reservation-service:
   # Build the Dockerfile located in the ./reservation-service directory
   build:
     context: .
     dockerfile: ./reservation-service/Dockerfile
   container_name: reservation-service
   restart: always
   ports:
     # Maps your host port 8085 to the container's port 8085
     - "8085:8085"
   depends_on:
     db:
       condition: service_healthy
     kafka:
       condition: service_started
   environment:
     KAFKA_BOOTSTRAP_SERVERS: kafka:29092
     SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
     SERVER_PORT: 8085
     SPRING_KAFKA_TOPIC_NAME: reservation.confirmed.events
     SENDGRID_API_KEY: "YOUR_REAL_SENDGRID_API_KEY"
     SENDGRID_FROM_EMAIL: "your-verified-sender@example.com"
     DATABASE_URL: "postgresql://myuser:mysecretpassword@db:5432/reservationdb"
     DB_HOST: db
     DB_PORT: 5432
     DB_NAME: reservationdb
     DB_USERNAME: myuser
     DB_PASSWORD: mysecretpassword
   networks:
     - app-network
   healthcheck:
     test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
     interval: 30s
     timeout: 10s
     start_period: 60s
     retries: 3
