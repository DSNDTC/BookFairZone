services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - app-network

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka
    ports:
      # Exposes Kafka to your host machine on port 9092
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      # Listeners:
      # - PLAINTEXT://kafka:29092 is for internal communication between containers
      # - PLAINTEXT_HOST://localhost:9092 is for communication from your host machine
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - app-network

  db:
    image: postgres:15-alpine # Use an official PostgreSQL image
    container_name: local_postgres_db
    restart: always
    environment:
      # Set environment variables for the database
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: reservationdb
    ports:
      # Map port 5432 on your host to 5432 in the container
      # This allows your app (even outside Docker) to connect via localhost:5432
      - "5432:5432"
    volumes:
      # Persist database data locally in a Docker volume
      - postgres_data:/var/lib/postgresql/data
      # Mount SQL init script to create additional databases
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d reservationdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  security-service:
    build:
      context: .
      dockerfile: ./security-service/Dockerfile
    container_name: security-service
    restart: always
    ports:
      - "8082:8082"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SERVER_PORT: 8082
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: reservation_security
      DB_USERNAME: myuser
      DB_PASSWORD: mysecretpassword
      JWT_SECRET: "e8C7y/8rYFvXokm3h4yx1NnTu7Eddk1LMZ4XscKfDcXKGuTfyDsvWgL5GqprbR8cJlI2zIZsRZbyE1zYDL4xXQ=="
      JWT_ACCESS_TOKEN_EXPIRATION: 900000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
      # Mail configuration for email verification
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: theshikanavod@gmail.com
      MAIL_PASSWORD: "qqig plgf uvyc nkxo"
      MAIL_FROM: theshikanavod@gmail.com
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      security-service:
        condition: service_healthy
      reservation-service:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: "e8C7y/8rYFvXokm3h4yx1NnTu7Eddk1LMZ4XscKfDcXKGuTfyDsvWgL5GqprbR8cJlI2zIZsRZbyE1zYDL4xXQ=="
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  reservation-service:
    # Build the Dockerfile located in the ./reservation-service directory
    build:
      context: .
      dockerfile: ./reservation-service/Dockerfile
    container_name: reservation-service
    restart: always
    ports:
      # Maps your host port 8085 to the container's port 8085
      - "8085:8085"
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      # This OVERRIDES the value in application.properties
      # It correctly points to the internal Kafka listener
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Your application properties
      SERVER_PORT: 8085
      SPRING_KAFKA_TOPIC_NAME: reservation.confirmed.events
      # Placeholders for your API keys
      SENDGRID_API_KEY: "YOUR_REAL_SENDGRID_API_KEY"
      SENDGRID_FROM_EMAIL: "your-verified-sender@example.com"
      DATABASE_URL: "postgresql://myuser:mysecretpassword@db:5432/reservationdb"
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: reservationdb
      DB_USERNAME: myuser
      DB_PASSWORD: mysecretpassword
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3


