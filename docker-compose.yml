  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      # Maps your host port 8083 to the container's port 8092
      - "8092:8092"
    depends_on:
      kafka:
        condition: service_started
    environment:
      # This OVERRIDES the value in application.properties
      # It correctly points to the internal Kafka listener
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Your application properties
      SERVER_PORT: 8092
      APP_KAFKA_TOPIC_NOTIFICATION: reservation-topic
      # Placeholders for your API keys
      SENDGRID_API_KEY: "YOUR_REAL_SENDGRID_API_KEY"
      SENDGRID_FROM_EMAIL: "your-verified-sender@example.com"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8092/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  kafka-consumer:
    image: confluentinc/cp-kafka:7.3.0
    container_name: kafka-consumer
    depends_on:
      - kafka
      #- reservation-service
    # This command block is now corrected
    command: >
      sh -c "
        echo 'Waiting for Kafka to be ready...'
        cub kafka-ready -b kafka:29092 1 60
        echo 'Kafka is ready!'
        kafka-console-consumer --bootstrap-server kafka:29092 --topic user.registered.events --from-beginning
      "
    networks:
      - app-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8095:8080"
    depends_on:
      - kafka
      - zookeeper
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # Define the network for services to communicate
networks:
  app-network:
    driver: bridge

# Define the volume for persistent data
volumes:
  postgres_data:
    driver: local
  mysql-data:
    driver: local