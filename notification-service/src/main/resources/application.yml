server:
  port: 8083 # Port for the notification service

spring:
  application:
    name: notification-service
  kafka:
    consumer:
      # Address of the Kafka broker
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      # Unique ID for this consumer group
      group-id: "notification_group"
      # Start reading from the earliest message if no offset is committed
      auto-offset-reset: earliest
      # Deserializers for the message key and value
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*" # Trust all packages for deserialization

# Custom application properties
app:
  kafka:
    # The topic this service will listen to
    reservation-confirmed-topic: "reservation.confirmed.events"
  sendgrid:
    # Your SendGrid API Key (use environment variables for security)
    api-key: ${SENDGRID_API_KEY:YOUR_DEFAULT_API_KEY}
    # The verified email address you're sending from
    from-email: ${SENDGRID_FROM_EMAIL:no-reply@bookfair.com}